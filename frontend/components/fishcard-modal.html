<div class="modal fade" id="fishcard-modal" tabindex="-1" aria-labelledby="fishcard-modalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="fishcard-modalLabel">Arvostele: <span id="modalFishName">Kala</span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <img id="modalFishImage" src="" class="img-fluid w-100 rounded mb-3" style="object-fit: cover; max-height: 200px;" alt="">
        <p id="modalFishDesc" class="text-muted"></p>
        <hr> <input type="hidden" id="currentRateFishId">

        <div class="mb-3">
          <label for="rating1" class="form-label d-flex justify-content-between">
            <span>Taistelutahto <small class="text-muted">(Keskiarvo: <span id="modal-avg-1">0.0</span>)</small></span>
            <strong><span id="val-rating1">2.5</span> / 5</strong>
          </label>
          <input type="range" class="form-range auto-submit-slider" min="0" max="5" step="0.5" id="rating1" value="2.5">
        </div>

        <div class="mb-3">
          <label for="rating2" class="form-label d-flex justify-content-between">
            <span>Harvinaisuus <small class="text-muted">(Keskiarvo: <span id="modal-avg-2">0.0</span>)</small></span>
            <strong><span id="val-rating2">2.5</span> / 5</strong>
          </label>
          <input type="range" class="form-range auto-submit-slider" min="0" max="5" step="0.5" id="rating2" value="2.5">
        </div>

        <div class="mb-3">
          <label for="rating3" class="form-label d-flex justify-content-between">
            <span>Maku <small class="text-muted">(Keskiarvo: <span id="modal-avg-3">0.0</span>)</small></span>
            <strong><span id="val-rating3">2.5</span> / 5</strong>
          </label>
          <input type="range" class="form-range auto-submit-slider" min="0" max="5" step="0.5" id="rating3" value="2.5">
        </div>

        <div class="mb-3">
          <label for="rating4" class="form-label d-flex justify-content-between">
            <span>Yleinen fiilis saaliista <small class="text-muted">(Keskiarvo: <span id="modal-avg-4">0.0</span>)</small></span>
            <strong><span id="val-rating4">2.5</span> / 5</strong>
          </label>
          <input type="range" class="form-range auto-submit-slider" min="0" max="5" step="0.5" id="rating4" value="2.5">
        </div>
        <hr class="mt-4">
        
        <button type="button" class="btn btn-outline-danger w-100" id="delete-rating-btn">
          <i class="fas fa-trash-alt me-2"></i> Poista arviot
        </button>
      </div>
    </div>
  </div>
</div>
